<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Users - C25 Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">
<link rel="stylesheet" href="backbtn.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
  linear-gradient(135deg,#0d0d0d,#171717,#101010);

  min-height:100vh;

  padding:14px;
  padding-top:165px;

  color:#fff;
  overflow-x:hidden;

  position:relative;
}

/* =========================
BACKGROUND GLOW
========================= */

body::before{
  content:"";
  position:fixed;

  width:320px;
  height:320px;

  background:rgba(255,140,0,0.16);

  border-radius:50%;
  filter:blur(120px);

  top:-120px;
  left:-80px;

  z-index:-1;
}

body::after{
  content:"";
  position:fixed;

  width:260px;
  height:260px;

  background:rgba(255,140,0,0.10);

  border-radius:50%;
  filter:blur(100px);

  bottom:-100px;
  right:-70px;

  z-index:-1;
}

/* =========================
HEADER
========================= */

.dashboard-header{

  width:calc(100% - 28px);

  padding:14px 16px;

  border-radius:24px;

  background:
  linear-gradient(145deg,
  rgba(255,255,255,0.08),
  rgba(255,255,255,0.03));

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.07);

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:
  0 15px 40px rgba(0,0,0,0.35);

  position:fixed;

  top:14px;
  left:14px;

  z-index:999;
}

.logo-side{
  display:flex;
  align-items:center;
  gap:12px;

  min-width:0;
}

.logo{
  width:58px;
  height:58px;

  border-radius:18px;
  object-fit:cover;

  flex-shrink:0;

  box-shadow:
  0 10px 25px rgba(255,140,0,0.35);
}

.logo-side div{
  min-width:0;
}

.logo-side h2{
  font-size:18px;
  font-weight:800;

  line-height:1.3;

  word-break:break-word;
}

.logo-side p{
  font-size:11px;
  margin-top:3px;
  color:#ffb347;
}

.admin-tag{

  padding:10px 14px;

  border-radius:14px;

  background:
  linear-gradient(135deg,#ff8c00,#ff6200);

  font-size:11px;
  font-weight:700;

  display:flex;
  align-items:center;
  gap:8px;

  white-space:nowrap;

  box-shadow:
  0 10px 25px rgba(255,140,0,0.35);
}

/* =========================
SEARCH BOX
========================= */

.search-box{

  width:100%;

  display:flex;
  align-items:center;
  gap:12px;

  padding:14px 16px;

  border-radius:20px;

  background:
  rgba(20,20,20,0.92);

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
  0 12px 30px rgba(0,0,0,0.30);

  position:sticky;

  top:102px;

  z-index:500;

  transition:0.3s;

  margin-bottom:18px;
}

.search-box.active-search{

  transform:scale(0.98);

  border-radius:18px;

  background:
  rgba(15,15,15,0.96);
}

.search-box i{
  font-size:16px;
  color:#ff9800;

  flex-shrink:0;
}

.search-box input{

  flex:1;

  border:none;
  outline:none;
  background:transparent;

  color:#fff;

  font-size:13px;
  font-weight:500;

  width:100%;
}

.search-box input::placeholder{
  color:#bdbdbd;
  font-size:12px;
}

/* =========================
TITLE
========================= */

.page-title{
  margin-bottom:18px;
}

.page-title h1{
  font-size:28px;
  font-weight:800;
}

.page-title p{
  color:#cfcfcf;
  margin-top:5px;
  font-size:13px;
}

/* =========================
USERS GRID
========================= */

.users-grid{
  display:grid;
  gap:18px;
}

/* =========================
USER CARD
========================= */

.user-card{

  position:relative;
  overflow:hidden;

  padding:18px;

  border-radius:24px;

  background:
  linear-gradient(145deg,
  rgba(255,255,255,0.07),
  rgba(255,255,255,0.03));

  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
  0 18px 40px rgba(0,0,0,0.30);

  transition:0.35s;
}

.user-card:hover{
  transform:
  translateY(-5px);
}

.user-card::before{
  content:"";

  position:absolute;

  width:160px;
  height:160px;

  background:rgba(255,140,0,0.10);

  border-radius:50%;

  top:-60px;
  right:-60px;
}

/* =========================
TOP USER
========================= */

.user-top{
  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:18px;
}

.user-avatar{

  width:58px;
  height:58px;

  min-width:58px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
  linear-gradient(135deg,#ff8c00,#ff6200);

  font-size:22px;
  color:#fff;

  box-shadow:
  0 12px 30px rgba(255,140,0,0.35);
}

.user-top h2{
  font-size:18px;
  font-weight:700;

  line-height:1.4;

  word-break:break-word;
}

.user-top span{
  font-size:11px;
  color:#ffb347;
}

/* =========================
INFO ROW
========================= */

.info-row{

  display:flex;
  align-items:flex-start;
  gap:10px;

  margin-top:14px;

  background:
  rgba(255,255,255,0.04);

  padding:12px;

  border-radius:15px;
}

.info-row i{

  width:38px;
  height:38px;

  min-width:38px;

  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
  linear-gradient(135deg,#ff8c00,#ff6200);

  color:#fff;
  font-size:14px;

  box-shadow:
  0 8px 20px rgba(255,140,0,0.25);
}

.info-row h4{
  font-size:12px;
  color:#ffb347;

  margin-bottom:3px;
}

.info-row p{

  font-size:13px;
  color:#fff;

  line-height:1.5;

  overflow-wrap:anywhere;
}

/* =========================
LOADING
========================= */

.loading{
  text-align:center;
  margin-top:50px;
  color:#bbb;
  font-size:15px;
}

/* =========================
TABLET + DESKTOP
========================= */

@media(min-width:768px){

  body{
    padding:20px;
    padding-top:190px;
  }

  .dashboard-header{
    width:calc(100% - 40px);

    top:20px;
    left:20px;

    padding:18px 22px;
  }

  .logo{
    width:70px;
    height:70px;
  }

  .logo-side h2{
    font-size:24px;
  }

  .logo-side p{
    font-size:13px;
  }

  .admin-tag{
    font-size:13px;
    padding:12px 18px;
  }

  .search-box{
    top:125px;

    padding:18px 20px;

    border-radius:24px;
  }

  .search-box i{
    font-size:20px;
  }

  .search-box input{
    font-size:15px;
  }

  .search-box input::placeholder{
    font-size:14px;
  }

  .page-title h1{
    font-size:34px;
  }

  .page-title p{
    font-size:15px;
  }

  .user-card{
    padding:24px;
    border-radius:30px;
  }

  .user-top{
    gap:18px;
  }

  .user-avatar{
    width:75px;
    height:75px;
    min-width:75px;

    font-size:30px;

    border-radius:24px;
  }

  .user-top h2{
    font-size:24px;
  }

  .user-top span{
    font-size:13px;
  }

  .info-row{
    padding:15px;
    border-radius:18px;
  }

  .info-row i{
    width:45px;
    height:45px;
    min-width:45px;

    font-size:18px;
  }

  .info-row h4{
    font-size:14px;
  }

  .info-row p{
    font-size:15px;
  }

}

</style>
</head>
<body>

<!-- HEADER -->

<header class="dashboard-header">

  <div class="logo-side">

    <img src="logo.png" class="logo">

    <div>
      <h2>C25 Cafe & Bakery</h2>
      <p>Premium Admin Dashboard</p>
    </div>

  </div>

  <div class="admin-tag">
    <i class="fa-solid fa-users"></i>
    USERS PANEL
  </div>

</header>

<!-- SEARCH -->

<div class="search-box">

  <i class="fa-solid fa-magnifying-glass"></i>

  <input
  type="text"
  id="searchInput"
  placeholder="Search name, email, phone, location, pincode...">

</div>

<!-- TITLE -->

<section class="page-title">

  <h1>All Users</h1>

  <p>
    Manage all registered cafe customers
  </p>

</section>

<!-- USERS -->

<div id="usersGrid" class="users-grid"></div>

<div id="loading" class="loading">
  Loading users...
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://sogyxzqvbquwrqlqpdaj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

/* =========================
SEARCH USERS
========================= */

function setupSearch(){

  const searchInput =
  document.getElementById("searchInput");

  searchInput.addEventListener("keyup", ()=>{

    const value =
    searchInput.value.toLowerCase();

    const cards =
    document.querySelectorAll(".user-card");

    cards.forEach((card)=>{

      const text =
      card.innerText.toLowerCase();

      if(text.includes(value)){

        card.style.display = "block";

      }

      else{

        card.style.display = "none";

      }

    });

  });

}

/* =========================
SEARCH ANIMATION
========================= */

window.addEventListener("scroll", ()=>{

  const searchBox =
  document.querySelector(".search-box");

  if(window.scrollY > 40){

    searchBox.classList.add("active-search");

  }

  else{

    searchBox.classList.remove("active-search");

  }

});

/* =========================
LOAD USERS
========================= */

async function loadUsers(){

  const grid =
  document.getElementById("usersGrid");

  const loading =
  document.getElementById("loading");

  const { data, error } =
  await supabaseClient
  .from("users")
  .select("*")
  .order("id",{ascending:false});

  loading.style.display = "none";

  if(error){

    grid.innerHTML = `
      <div class="loading">
        Error loading users
      </div>
    `;

    console.log(error);

    return;
  }

  if(!data || data.length === 0){

    grid.innerHTML = `
      <div class="loading">
        No users found
      </div>
    `;

    return;
  }

  grid.innerHTML = "";

  data.forEach(user => {

    grid.innerHTML += `

    <div class="user-card">

      <div class="user-top">

        <div class="user-avatar">
          <i class="fa-solid fa-user"></i>
        </div>

        <div>
          <h2>${user.name || "No Name"}</h2>
          <span>C25 Customer</span>
        </div>

      </div>

      <div class="info-row">

        <i class="fa-solid fa-envelope"></i>

        <div>
          <h4>Email Address</h4>
          <p>${user.email || "N/A"}</p>
        </div>

      </div>

      <div class="info-row">

        <i class="fa-solid fa-phone"></i>

        <div>
          <h4>Phone Number</h4>
          <p>${user.phone || "N/A"}</p>
        </div>

      </div>

      <div class="info-row">

        <i class="fa-solid fa-location-dot"></i>

        <div>
          <h4>Location</h4>
          <p>${user.location || "N/A"}</p>
        </div>

      </div>

      <div class="info-row">

        <i class="fa-solid fa-map-pin"></i>

        <div>
          <h4>Pincode</h4>
          <p>${user.pincode || "N/A"}</p>
        </div>

      </div>

    </div>

    `;

  });

}

loadUsers();
setupSearch();

</script>
<script src="backbtn.js"></script>
</body>
</html>
