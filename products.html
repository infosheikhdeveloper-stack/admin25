<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products - C25 Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="backbtn.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0d0d0d,#171717,#101010);
  min-height:100vh;
  padding:14px;
  padding-top:165px;
  color:#fff;
}

/* BACKGROUND */
body::before, body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  z-index:-1;
}

body::before{
  width:320px;height:320px;
  background:rgba(255,140,0,0.16);
  top:-120px;left:-80px;
}

body::after{
  width:260px;height:260px;
  background:rgba(255,140,0,0.10);
  bottom:-100px;right:-70px;
}

/* HEADER */
.dashboard-header{
  width:calc(100% - 28px);
  padding:14px 16px;
  border-radius:24px;
  background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:14px;
  left:14px;
  z-index:999;
}

.logo-side{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:58px;
  height:58px;
  border-radius:18px;
}

.admin-tag{
  padding:10px 14px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff8c00,#ff6200);
  font-size:11px;
  font-weight:700;
}

/* TITLE */
.page-title{
  margin-bottom:20px;
}
.page-title h1{
  font-size:28px;
  font-weight:800;
}
.page-title p{
  font-size:13px;
  color:#ccc;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.card h3{
  font-size:16px;
}

.card p{
  font-size:12px;
  color:#bbb;
  margin-top:5px;
}

.price{
  margin-top:8px;
  color:#ffb347;
  font-weight:700;
}

.badge{
  display:inline-block;
  margin-top:8px;
  font-size:11px;
  padding:4px 8px;
  border-radius:10px;
  background:rgba(255,140,0,0.15);
  color:#ffb347;
}

.delete-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#ff3b3b;
  color:#fff;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->
<header class="dashboard-header">
  <div class="logo-side">
    <img src="logo.png" class="logo">
    <div>
      <h2>C25 Cafe</h2>
      <p>Products Panel</p>
    </div>
  </div>

  <div class="admin-tag">
    <i class="fa-solid fa-box"></i> PRODUCTS
  </div>
</header>

<!-- TITLE -->
<section class="page-title">
  <h1>All Products</h1>
  <p>Manage your uploaded products</p>
</section>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<script>

/* SUPABASE */
const supabaseClient = supabase.createClient(
  "https://sogyxzqvbquwrqlqpdaj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

/* FETCH PRODUCTS */
async function loadProducts(){

  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(item => {

    container.innerHTML += `
      <div class="card">
        <img src="${item.image}" />

        <div class="card-body">
          <h3>${item.title}</h3>
          <p>${item.description}</p>

          <div class="price">₹ ${item.price}</div>

          <div class="badge">${item.category}</div>

          <button class="delete-btn" onclick="deleteProduct('${item.id}')">
            Delete
          </button>
        </div>
      </div>
    `;
  });

}

/* DELETE PRODUCT */
async function deleteProduct(id){

  const confirmDelete = confirm("Delete this product?");
  if(!confirmDelete) return;

  const { error } = await supabaseClient
    .from("products")
    .delete()
    .eq("id", id);

  if(error){
    alert("Delete failed!");
    return;
  }

  loadProducts();
}

/* INIT */
loadProducts();

</script>
<script src="backbtn.js"></script>
</body>
</html>
