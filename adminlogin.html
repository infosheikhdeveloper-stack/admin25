<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - C25</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===================== RESET ===================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

html,body{
  height:100%;
  width:100%;
  overflow:hidden; /* FIX OVERFLOW */
}

/* ===================== BODY ===================== */
body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0d0d0d,#1a1a1a,#111);
  color:#fff;
  padding:20px;
  position:relative;
}

/* ===================== BACKGROUND GLOW ===================== */
body::before,
body::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  z-index:0;
}

body::before{
  width:320px;
  height:320px;
  background:rgba(255,140,0,0.25);
  top:-120px;
  left:-100px;
}

body::after{
  width:280px;
  height:280px;
  background:rgba(255,140,0,0.15);
  bottom:-120px;
  right:-100px;
}

/* ===================== LOGIN BOX ===================== */
.login-box{
  width:100%;
  max-width:380px;
  padding:28px 22px;
  border-radius:26px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);

  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 25px 60px rgba(0,0,0,0.6);

  text-align:center;

  position:relative;
  z-index:1;

  animation:fadeUp 0.7s ease forwards;
}

@keyframes fadeUp{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* LOGO */
.login-box img{
  width:65px;
  height:65px;
  border-radius:18px;
  margin-bottom:10px;
  box-shadow:0 10px 25px rgba(255,140,0,0.4);
}

/* TEXT */
.login-box h2{
  font-size:22px;
  font-weight:800;
}

.login-box p{
  font-size:13px;
  color:#ffb347;
  margin-bottom:18px;
}

/* INPUT */
.input-box{
  margin:10px 0;
}

.input-box input{
  width:100%;
  padding:13px;
  border:none;
  outline:none;

  border-radius:14px;

  background:rgba(255,255,255,0.08);
  color:#fff;

  font-size:14px;
}

.input-box input::placeholder{
  color:#aaa;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:10px;

  border:none;
  border-radius:14px;

  font-weight:700;
  font-size:15px;

  cursor:pointer;

  background:linear-gradient(135deg,#ff8c00,#ff6200);
  color:#fff;

  box-shadow:0 10px 25px rgba(255,140,0,0.4);

  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

/* ===================== TOP NOTIFICATION ===================== */
.notify{
  position:fixed;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  background:#00c853;
  color:#fff;

  padding:12px 18px;
  border-radius:14px;

  font-weight:700;
  font-size:14px;

  box-shadow:0 15px 40px rgba(0,0,0,0.4);

  transition:0.4s ease;
  z-index:9999;

  width:90%;
  max-width:320px;
  text-align:center;
}

.notify.show{
  top:20px;
}

.notify.error{
  background:#d50000;
}

/* ===================== MOBILE FIX ===================== */
@media(max-width:480px){

  body{
    padding:15px;
  }

  .login-box{
    padding:24px 18px;
    border-radius:22px;
  }

  .login-box h2{
    font-size:20px;
  }

  .login-box p{
    font-size:12px;
  }

  button{
    font-size:14px;
    padding:12px;
  }
}

</style>
</head>

<body>

<!-- NOTIFICATION -->
<div id="notify" class="notify"></div>

<!-- LOGIN BOX -->
<div class="login-box">

  <img src="logo.png">

  <h2>Admin Login</h2>
  <p>C25 Secure Panel</p>

  <div class="input-box">
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <button onclick="login()">LOGIN</button>

</div>

<script>

const supabaseClient = supabase.createClient(
  "https://sogyxzqvbquwrqlqpdaj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

function showNotify(msg, type="success"){
  const box = document.getElementById("notify");

  box.innerText = msg;
  box.className = "notify show";

  if(type === "error"){
    box.classList.add("error");
  }

  setTimeout(()=>{
    box.classList.remove("show");
  },2500);
}

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    showNotify("Please fill all fields","error");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    showNotify("Login Failed ❌","error");
    return;
  }

  const user = data.user;

  const { data: profile, error: pError } = await supabaseClient
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if(pError || profile?.role !== "admin"){
    await supabaseClient.auth.signOut();
    showNotify("Not Admin ❌","error");
    return;
  }

  showNotify("Login Successful ✔");

  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },1200);
}

</script>

</body>
</html>
